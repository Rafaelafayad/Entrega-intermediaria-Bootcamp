<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Autocuidado Diário</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Autocuidado</h2>

  <ul id="lista">
    <li>
      <div class="item-texto">
        <input type="checkbox">
        <span>Beber água</span>
      </div>
    </li>

    <li>
      <div class="item-texto">
        <input type="checkbox">
        <span>Dormir bem</span>
      </div>
    </li>

    <li>
      <div class="item-texto">
        <input type="checkbox">
        <span>Fazer exercício</span>
      </div>
    </li>

    <li>
      <div class="item-texto">
        <input type="checkbox">
        <span>Comer saudável</span>
      </div>
    </li>
  </ul>

  <!-- adicionar -->
  <div class="adicionar-area">
    <input type="text" id="novaTarefa" placeholder="Ex: Hidratar a pele">
    <button onclick="adicionar()">Adicionar</button>
  </div>

  <!-- espaço -->
  <div class="espaco"></div>

<div class="clima-box">
  <h3>🌤️ Clima Atual</h3>
  <p id="temperatura">Carregando clima...</p>
  <p id="dica-clima"></p>
</div>

<div class="clima-box">
  <h3>🕒 Horário de Brasília</h3>

  <p id="relogio">
    Carregando horário...
  </p>
</div>

  <!-- finalizar -->
  <button class="reset" onclick="resetar()">Finalizar dia</button>
</div>

<script src="script.js"></script>
</body>
</html>
